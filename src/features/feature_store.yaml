project: criteo_ctr

registry:
  registry_type: sql
  path: ${DATABASE_URL}

provider: local

offline_store:
  type: postgres
  host: ${DATABASE_HOST}
  port: 5432
  database: postgres
  db_schema: feast
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}

online_store:
  type: redis
  connection_string: "${REDIS_HOST}:${REDIS_PORT},password=${REDIS_PASSWORD}"
  
entity_key_serialization_version: 3